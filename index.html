<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Candela — Carga de lecturas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4f8ef7; --green: #27ae60; --red: #eb5757; --surface: #ffffff; --border: #e2e8f0; --text: #1e293b; --text-dim: #64748b; --radius: 12px; }
        body { background: #f1f5f9; font-family: 'DM Mono', monospace; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        select, input, textarea { width: 100%; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 13px; font-size: 16px; }
        .foto-area { border: 2px dashed var(--border); border-radius: 10px; min-height: 80px; display: flex; align-items: center; justify-content: center; background: #f8fafc; cursor: pointer; }
        #fotoPreview { width: 100%; max-height: 200px; object-fit: cover; display: none; border-radius: 8px; }
        .btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 16px; font-weight: 700; cursor: pointer; }
        #confirmScreen { display: none; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { background: #f8fafc; border: 1px solid var(--border); padding: 15px; border-radius: 10px; }
        .stat-label { font-size: 10px; color: var(--text-dim); }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--blue); }
        .alert-box { background: #fff1f1; border: 1px solid var(--red); padding: 15px; border-radius: 10px; color: #991b1b; display: none; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" id="formContainer">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">💧 Medidores</h2>
        <div class="field">
            <label>Lote</label>
            <select id="lote">
                <option value="">Seleccionar...</option>
                <option value="Medidor AYSA">Medidor AYSA</option>
                <script>for(let i=1; i<=168; i++) document.write(`<option value="${i}">Lote ${i}</option>`);</script>
            </select>
        </div>
        <div class="field"><label>Lectura (m3)</label><input type="number" id="lectura" inputmode="numeric"></div>
        <div class="field"><label>Observaciones</label><textarea id="observaciones"></textarea></div>
        <div class="field"><label>Foto</label>
            <div class="foto-area" onclick="document.getElementById('fotoInput').click()">
                <span id="txtFoto">📷 Sacar Foto</span><img id="fotoPreview">
            </div>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="preview(event)">
        </div>
        <button class="btn-submit" id="btn" onclick="enviar()">ENVIAR REGISTRO</button>
    </div>

    <div class="card" id="confirmScreen">
        <h2 style="color:var(--green)">✅ Registro Guardado</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Anterior</div><div class="stat-value" id="vAnt">-</div></div>
            <div class="stat-card"><div class="stat-label">Días</div><div class="stat-value" id="vDias">-</div></div>
            <div class="stat-card" style="grid-column: 1/3;"><div class="stat-label">Promedio Diario</div><div class="stat-value" id="vProm">-</div></div>
        </div>
        <div class="alert-box" id="vAlert">⚠️ ALERTA: Consumo diario alto. Revisar posibles fugas.</div>
        <button class="btn-submit" style="background:none; color:var(--blue); border:1px solid var(--blue); margin-top:20px;" onclick="location.reload()">+ NUEVO REGISTRO</button>
    </div>

    <script>
        // PEGA AQUÍ TU NUEVA URL DE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXgmZdGTAX_jwXuAICbY2axtWU9UKfiCMBWVAQCTExWBES9G7oTh334m0Ti7_TtmE/exec";
        let fotoData = [];

        function preview(e) {
            const reader = new FileReader();
            reader.onload = () => { 
                document.getElementById('fotoPreview').src = reader.result;
                document.getElementById('fotoPreview').style.display = 'block';
                document.getElementById('txtFoto').style.display = 'none';
                fotoData = reader.result.split(',');
            };
            reader.readAsDataURL(e.target.files);
        }

        async function enviar() {
            const lote = document.getElementById('lote').value;
            const lectura = document.getElementById('lectura').value;
            if(!lote || !lectura) return alert("Lote y Lectura son obligatorios.");
            
            document.getElementById('btn').innerText = "ENVIANDO...";
            document.getElementById('btn').disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({lote, lectura, observaciones: document.getElementById('observaciones').value, foto: fotoData})
                });
                
                const res = await response.json();
                document.getElementById('vAnt').innerText = res.lecturaAnterior;
                document.getElementById('vDias').innerText = res.dias;
                document.getElementById('vProm').innerText = res.promedio + " m3";
                if(parseFloat(res.promedio) > 5) document.getElementById('vAlert').style.display = 'block';
                
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('confirmScreen').style.display = 'flex';
            } catch(e) {
                alert("Guardado. Recargando para nuevo registro.");
                location.reload();
            }
        }
    </script>
</body>
</html>
