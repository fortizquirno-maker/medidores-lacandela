<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Candela — Carga de lecturas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* Estilos profesionales basados en la identidad del sistema */
        :root {
            --blue: #4f8ef7; --green: #27ae60; --red: #eb5757; --yellow: #f2994a;
            --surface: #ffffff; --surface2: #f8fafc; --border: #e2e8f0;
            --text: #1e293b; --text-dim: #64748b; --radius: 12px; --transition: 0.2s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f1f5f9; font-family: 'DM Mono', monospace; color: var(--text); display: flex; justify-content: center; padding: 20px; }
        
        .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { margin-bottom: 24px; }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
        .header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

        .field { margin-bottom: 20px; }
        .field label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .req { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }

        select, input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 13px; outline: none; transition: all var(--transition); }
        textarea { resize: vertical; min-height: 80px; font-size: 14px; }
        select:focus, input:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }

        .foto-area { width: 100%; border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface2); position: relative; overflow: hidden; }
        .foto-area.has-foto { border-style: solid; border-color: var(--green); }
        #fotoPreview { width: 100%; max-height: 300px; object-fit: cover; display: none; }

        .btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 16px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        #confirmScreen { display: none; text-align: center; }
        .success-box { background: #ecfdf5; border: 1px solid var(--green); padding: 30px; border-radius: var(--radius); color: var(--green); }
    </style>
</head>
<body>

    <div class="card" id="formContainer">
        <div class="header">
            <h1>💧 Medidores</h1>
            <p>La Candela — Carga de lecturas</p>
        </div>

        <div class="field">
            <label><span class="req"></span> Selección de Lote</label>
            <select id="lote">
                <option value="">Elegí un lote...</option>
                <option value="Medidor AYSA">Medidor AYSA (Principal)</option>
                <optgroup label="Dormis / Módulos">
                    <option value="D1">D1 (Dormi 1)</option>
                    <option value="D2">D2 (Dormi 2)</option>
                    <option value="D3">D3 (Dormi 3)</option>
                    <option value="D4">D4 (Dormi 4)</option>
                    <option value="D5">D5 (Dormi 5)</option>
                </optgroup>
                <optgroup label="Lotes Numéricos">
                    <script>
                        for(let i=1; i<=168; i++) {
                            document.write(`<option value="${i}">Lote ${i}</option>`);
                        }
                    </script>
                </optgroup>
            </select>
        </div>

        <div class="field">
            <label><span class="req"></span> Lectura Actual (m3)</label>
            <input type="number" id="lectura" placeholder="Ej: 54159" inputmode="numeric">
        </div>

        <div class="field">
            <label>Observaciones</label>
            <textarea id="observaciones" placeholder="Ej: Pérdida en canilla, medidor clavado, ilegible..."></textarea>
        </div>

        <div class="field">
            <label><span class="req"></span> Foto del Medidor</label>
            <div class="foto-area" onclick="document.getElementById('fotoInput').click()" id="fotoDrop">
                <div id="placeholderText">📷 Tocar para sacar foto</div>
                <img id="fotoPreview">
            </div>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(event)">
        </div>

        <button class="btn-submit" id="btnEnviar" onclick="enviarDatos()">ENVIAR REGISTRO</button>
    </div>

    <div class="card" id="confirmScreen">
        <div class="success-box">
            <div style="font-size: 40px;">✅</div>
            <h2 style="margin: 10px 0;">Registro Guardado</h2>
            <p style="font-size: 12px;">Los datos y la foto se subieron a la planilla con éxito.</p>
        </div>
        <button class="btn-submit" style="background: transparent; color: var(--blue); border: 1px solid var(--blue); margin-top: 20px;" onclick="location.reload()">+ NUEVO REGISTRO</button>
    </div>

    <script>
        // URL extraída de las fuentes [1]
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpoAAv2Y40nsh6rpayoVS9LfQo5oRKmSYhYJT9-vK9O4dPRDnwA62kFNXEyCHvSDg/exec";
        let fotoBase64 = "";

        function previewImage(event) {
            const file = event.target.files;
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('fotoPreview');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('placeholderText').style.display = 'none';
                document.getElementById('fotoDrop').classList.add('has-foto');
                fotoBase64 = reader.result.split(',')[4];
            }
            reader.readAsDataURL(file);
        }

        async function enviarDatos() {
            const lote = document.getElementById('lote').value;
            const lectura = document.getElementById('lectura').value;
            const observaciones = document.getElementById('observaciones').value;
            const btn = document.getElementById('btnEnviar');

            if (!lote || !lectura || !fotoBase64) {
                alert("Por favor completá lote, lectura y foto.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const payload = {
                lote: lote,
                lectura: lectura,
                observaciones: observaciones,
                foto: fotoBase64
            };

            try {
                // Se utiliza el método POST hacia la URL de Google Apps Script [1]
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('confirmScreen').style.display = 'block';
            } catch (error) {
                alert("Error al enviar: " + error);
                btn.disabled = false;
                btn.innerText = "ENVIAR REGISTRO";
            }
        }
    </script>
</body>
</html>
