<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Candela — Registro de Medidores</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4f8ef7; --green: #27ae60; --red: #eb5757; --surface: #ffffff; --surface2: #f8fafc; --border: #e2e8f0; --text: #1e293b; --text-dim: #64748b; --radius: 12px; }
        body { background: #f1f5f9; font-family: 'DM Mono', monospace; color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { margin-bottom: 24px; }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
        .field { margin-bottom: 20px; }
        label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .req { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }
        select, input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 13px; font-family: 'DM Mono'; font-size: 16px; outline: none; }
        .foto-area { border: 2px dashed var(--border); border-radius: 10px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface2); cursor: pointer; overflow: hidden; }
        #fotoPreview { width: 100%; max-height: 250px; object-fit: cover; display: none; }
        .btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 16px; font-family: 'Syne'; font-size: 15px; font-weight: 700; cursor: pointer; }
        /* Pantalla Final */
        #confirmScreen { display: none; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: left; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--blue); }
        .alert-box { background: #fff1f1; border: 1px solid var(--red); padding: 15px; border-radius: 10px; color: #991b1b; display: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card" id="formContainer">
        <div class="header"><h1>💧 Medidores</h1><p>La Candela — Registro de Lecturas</p></div>
        <div class="field">
            <label><span class="req"></span> Lote</label>
            <select id="lote">
                <option value="">Seleccionar lote...</option>
                <option value="Medidor AYSA">Medidor AYSA</option>
                <script>for(let i=1; i<=168; i++) document.write(`<option value="${i}">Lote ${i}</option>`);</script>
            </select>
        </div>
        <div class="field"><label><span class="req"></span> Lectura (m3)</label><input type="number" id="lectura" inputmode="numeric"></div>
        <div class="field"><label>Observaciones (Opcional)</label><textarea id="obs"></textarea></div>
        <div class="field"><label>Foto (Opcional)</label>
            <div class="foto-area" onclick="document.getElementById('fotoInput').click()">
                <span id="txtFoto">📷 Tocar para foto</span><img id="fotoPreview">
            </div>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="preview(event)">
        </div>
        <button class="btn-submit" id="btn" onclick="enviar()">ENVIAR REGISTRO</button>
    </div>

    <div class="card" id="confirmScreen">
        <div style="font-size: 40px; color: var(--green);">✅</div>
        <h2 style="color: var(--green); font-family: 'Syne';">Registro Guardado</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Anterior</div><div id="vAnt" class="stat-value">-</div></div>
            <div class="stat-card"><div class="stat-label">Fecha Ant.</div><div id="vFecha" class="stat-value" style="font-size:16px">-</div></div>
            <div class="stat-card"><div class="stat-label">Días</div><div id="vDias" class="stat-value">-</div></div>
            <div class="stat-card"><div class="stat-label">Promedio</div><div id="vProm" class="stat-value">-</div><small>m3/día</small></div>
        </div>
        <div class="alert-box" id="vAlert">⚠️ Consumo diario alto detectado.</div>
        <p style="font-size: 11px; color: var(--text-dim); margin-top: 30px;">Cerrá esta pestaña para finalizar.</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2lQrvkcg9zAbaT0zgpsUftFdjU8jkp8GHY-wY-gcjtkjL9PZUWHbZYIWaT-qgTZA/exec";
        let fotoData = [];

        function preview(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('fotoPreview').src = reader.result;
                document.getElementById('fotoPreview').style.display = 'block';
                document.getElementById('txtFoto').style.display = 'none';
                fotoData = reader.result.split(',');
            };
            reader.readAsDataURL(e.target.files);
        }

        async function enviar() {
            const lote = document.getElementById('lote').value;
            const lectura = document.getElementById('lectura').value;
            if(!lote || !lectura) return alert("Lote y Lectura son obligatorios.");
            document.getElementById('btn').innerText = "ENVIANDO...";
            document.getElementById('btn').disabled = true;

            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({lote, lectura, observaciones: document.getElementById('obs').value, foto: fotoData})
                });
                const res = await resp.json();
                document.getElementById('vAnt').innerText = res.lecturaAnterior;
                document.getElementById('vFecha').innerText = res.fechaAnterior;
                document.getElementById('vDias').innerText = res.dias;
                document.getElementById('vProm').innerText = res.promedio;
                if(parseFloat(res.promedio) > 5) document.getElementById('vAlert').style.display = 'block';
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('confirmScreen').style.display = 'block';
            } catch(e) { alert("Registro enviado a la planilla."); location.reload(); }
        }
    </script>
</body>
</html>
