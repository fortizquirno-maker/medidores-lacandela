<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Candela — Carga de lecturas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #4f8ef7; --green: #27ae60; --red: #eb5757; --yellow: #f2994a;
            --surface: #ffffff; --surface2: #f8fafc; --border: #e2e8f0;
            --text: #1e293b; --text-dim: #64748b; --text-muted: #94a3b8;
            --radius: 12px; --transition: 0.2s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f1f5f9; font-family: 'DM Mono', monospace; color: var(--text); display: flex; justify-content: center; padding: 20px; }
        
        .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { margin-bottom: 24px; }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
        .header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

        .field { margin-bottom: 20px; }
        .field label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .req { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }

        select, input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 13px; outline: none; }
        textarea { resize: vertical; min-height: 80px; font-size: 14px; }

        .foto-area { width: 100%; border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface2); overflow: hidden; }
        .foto-area.has-foto { border-style: solid; border-color: var(--green); }
        #fotoPreview { width: 100%; max-height: 200px; object-fit: cover; display: none; }

        .btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 16px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { opacity: 0.5; }

        /* Pantalla de Confirmación Avanzada */
        #confirmScreen { display: none; }
        .confirm-header { text-align: center; margin-bottom: 20px; color: var(--green); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .stat-card.full { grid-column: 1 / -1; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--blue); }
        
        .alert-box { background: #fff1f1; border: 1px solid var(--red); border-radius: var(--radius); padding: 16px; display: none; align-items: flex-start; gap: 12px; margin-top: 10px; }
        .alert-box.show { display: flex; }
        .alert-icon { font-size: 20px; }
        .alert-text { font-size: 13px; font-weight: 600; color: #991b1b; }
    </style>
</head>
<body>

    <div class="card" id="formContainer">
        <div class="header">
            <h1>💧 Medidores</h1>
            <p>La Candela — Registro de Lecturas</p>
        </div>

        <div class="field">
            <label><span class="req"></span> Lote</label>
            <select id="lote">
                <option value="">Elegí un lote...</option>
                <option value="Medidor AYSA">Medidor AYSA (Principal)</option>
                <script>
                    for(let i=1; i<=168; i++) document.write(`<option value="${i}">Lote ${i}</option>`);
                </script>
            </select>
        </div>

        <div class="field">
            <label><span class="req"></span> Lectura Actual (m3)</label>
            <input type="number" id="lectura" placeholder="Ej: 54159" inputmode="numeric">
        </div>

        <div class="field">
            <label>Observaciones (Opcional)</label>
            <textarea id="observaciones" placeholder="Cualquier novedad detectada..."></textarea>
        </div>

        <div class="field">
            <label>Foto (Opcional)</label>
            <div class="foto-area" onclick="document.getElementById('fotoInput').click()" id="fotoDrop">
                <div id="placeholderText">📷 Tocar para foto</div>
                <img id="fotoPreview">
            </div>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(event)">
        </div>

        <button class="btn-submit" id="btnEnviar" onclick="enviarDatos()">ENVIAR REGISTRO</button>
    </div>

    <!-- PANTALLA DE CONFIRMACIÓN CON CÁLCULOS -->
    <div class="card" id="confirmScreen">
        <div class="confirm-header">
            <div style="font-size: 40px;">✅</div>
            <h2>Registro Guardado</h2>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Lectura Anterior</div>
                <div class="stat-value" id="valAnterior">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Días Transcurridos</div>
                <div class="stat-value" id="valDias">-</div>
            </div>
            <div class="stat-card full">
                <div class="stat-label">Promedio Diario</div>
                <div class="stat-value" id="valPromedio">- <small style="font-size: 12px; color: var(--text-muted)">m3/día</small></div>
            </div>
        </div>

        <div class="alert-box" id="alertaConsumo">
            <div class="alert-icon">⚠️</div>
            <div class="alert-text">Alerta: Consumo Diario Alto. Posible pérdida o fuga en el lote.</div>
        </div>

        <button class="btn-submit" style="background:transparent; color:var(--blue); border:1px solid var(--blue); margin-top:20px;" onclick="location.reload()">+ NUEVO REGISTRO</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpoAAv2Y40nsh6rpayoVS9LfQo5oRKmSYhYJT9-vK9O4dPRDnwA62kFNXEyCHvSDg/exec";
        let fotoBase64 = "";

        function previewImage(e) {
            const file = e.target.files;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('fotoPreview').src = reader.result;
                document.getElementById('fotoPreview').style.display = 'block';
                document.getElementById('placeholderText').style.display = 'none';
                document.getElementById('fotoDrop').classList.add('has-foto');
                fotoBase64 = reader.result.split(',')[3];
            }
            reader.readAsDataURL(file);
        }

        async function enviarDatos() {
            const lote = document.getElementById('lote').value;
            const lectura = document.getElementById('lectura').value;
            const observaciones = document.getElementById('observaciones').value;
            const btn = document.getElementById('btnEnviar');

            if (!lote || !lectura) {
                alert("Lote y Lectura son obligatorios.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                // El script ahora debe devolver un JSON con la lectura anterior
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ lote, lectura, observaciones, foto: fotoBase64 })
                });
                
                const res = await response.json();
                
                // Mostrar resultados
                document.getElementById('valAnterior').innerText = res.lecturaAnterior || "N/A";
                document.getElementById('valDias').innerText = res.dias || "0";
                document.getElementById('valPromedio').innerText = res.promedio ? res.promedio.toFixed(2) : "0.00";
                
                // Lógica de alerta si el promedio es alto (ej: > 10 m3/día como el Lote 49) [4, 5]
                if (res.promedio > 5) { // Umbral de ejemplo, ajustable
                    document.getElementById('alertaConsumo').classList.add('show');
                }

                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('confirmScreen').style.display = 'block';
            } catch (e) {
                // Fallback si no hay CORS habilitado pero se envió igual
                alert("Registro enviado. Reiniciando...");
                location.reload();
            }
        }
    </script>
</body>
</html>
